apiVersion: v1
kind: Secret
metadata:
  name: sarif-secrets
  # namespace is baked in here because this file is applied out-of-band,
  # not managed by kustomize.
  namespace: sarif
  labels:
    app.kubernetes.io/name: sarif
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: sarif
type: Opaque
stringData:
  # ── Required — app will not function correctly without these ──────────────────
  SEATS_API_KEY: "REPLACE_ME"         # seats.aero Partner API key (award search)
  PUSHOVER_TOKEN: "REPLACE_ME"        # Pushover application token (alert notifications)
  PUSHOVER_USER_KEY: "REPLACE_ME"     # Pushover user key (alert notifications)
  # ── Optional — endpoints return HTTP 503 when unset, app still boots ─────────
  RAPIDAPI_KEY: "REPLACE_ME"          # RapidAPI key → GET /api/cashbiz (business cash prices)
  TRAVELPAYOUTS_TOKEN: "REPLACE_ME"   # Travelpayouts token → GET /api/cash (economy cash prices)
# ── HOW TO USE ────────────────────────────────────────────────────────────────────
# 1. cp k8s/base/secret.example.yaml k8s/base/secret.yaml
# 2. Fill in the real values (secret.yaml is gitignored — never commit it).
# 3. kubectl apply -f k8s/base/secret.yaml
#
# IMPORTANT: apply order in Session 2 —
#   (1) kubectl apply -k k8s/overlays/local    (creates Namespace sarif)
#       — OR: kubectl apply -f k8s/overlays/local/namespace.yaml
#   (2) kubectl apply -f k8s/base/secret.yaml  (must exist before pod starts)
#   (3) kubectl apply -k k8s/overlays/local    (Deployment becomes schedulable)
#
# envFrom.secretRef is NOT marked optional, so the pod will not start until
# sarif-secrets exists. This is correct production behavior.
