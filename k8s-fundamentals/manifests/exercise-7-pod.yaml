apiVersion: v1
kind: Pod
metadata:
  name: configmap-test
spec:
  containers:
    - name: busybox
      image: busybox
      command: ["sleep", "3600"]
      env:
        - name: app_env
          valueFrom:
            configMapKeyRef:
              name: myconfigmap
              key: APP_ENV
        - name: log_level
          valueFrom:
            configMapKeyRef:
              name: myconfigmap
              key: LOG_LEVEL
