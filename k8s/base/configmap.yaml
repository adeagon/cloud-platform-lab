apiVersion: v1
kind: ConfigMap
metadata:
  name: sarif-config
  labels:
    app.kubernetes.io/name: sarif
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: sarif
    app.kubernetes.io/managed-by: kustomize
data:
  HOST: "0.0.0.0"
  PORT: "3001"
  SARIF_DB_PATH: "/data/sarif.db"
  # Empty string — the app falls back to /localhost:\d+/ at runtime, not "CORS disabled".
  # The local overlay sets CORS_ORIGIN: "http://sarif.local" via a strategic-merge patch.
  CORS_ORIGIN: ""
  ALERT_POLL_INTERVAL_MS: "900000"
  MAX_ALERTS: "10"
